name: Build bawa binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bawa
        run: cargo install bawa --root ./output

      - name: Create Release
        run: |
          gh release create bawa-v0.1.0 output/bin/bawa \
            --title "bawa v0.1.0" \
            --notes "bawa v0.1.0 binary for Linux x86_64"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
